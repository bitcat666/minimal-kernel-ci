name: Build Minimal XP Kernel via razzle

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download source
      shell: pwsh
      run: |
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" -Headers $headers
        $asset = $release.assets | Where-Object { $_.name -like "minimal_XP*" }
        Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile "minimal_XP.7z"
        7z x minimal_XP.7z -oD:\ -y
        
        # Need full NT source for public/ and tools/. Map minimal_XP -> NT
        echo === Mapping minimal_XP as NT ===
        cmd /c "mklink /D D:\NT D:\minimal_XP" 2>nul
        dir D:\NT\base\ntos\ke 2>nul

    - name: Build kernel (hardcoded env, no razzle)
      shell: cmd
      working-directory: D:\NT
      run: |
        REM === Hardcoded razzle environment (same vars razzle sets) ===
        set _BuildArch=x86
        set 386=1
        set PROCESSOR_ARCHITECTURE=x86
        set _NTDRIVE=D:
        set _NTBINDIR=D:\NT
        set _NTROOT=\
        set NTMAKEENV=D:\NT\tools
        set BUILD_PRODUCT=NT
        set BUILD_DEFAULT_TARGETS=-x86
        set BUILD_MAKE_PROGRAM=nmake.exe
        set PROJECT_ROOT=D:\NT\shell
        set O=obj\i386
        set FREEBUILD=1
        set NTDEBUG=ntsd
        set 386=1
        
        echo === Building base/ntos (minimal 9-module kernel) ===
        echo dirs:
        type base\ntos\dirs
        echo.
        cd base\ntos
        build /cZP
        echo BUILD EXIT: %ERRORLEVEL%
        dir /s ntoskrnl.exe 2>nul || echo No ntoskrnl.exe found

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ntoskrnl
        path: D:\NT\base\ntos\**\ntoskrnl.exe
