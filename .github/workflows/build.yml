name: Build Minimal XP Kernel via razzle

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download source
      shell: pwsh
      run: |
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" -Headers $headers
        $asset = $release.assets | Where-Object { $_.name -like "minimal_XP*" }
        Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile "minimal_XP.7z"
        7z x minimal_XP.7z -oD:\ -y
        
        # Need full NT source for public/ and tools/. Map minimal_XP -> NT
        echo === Mapping minimal_XP as NT ===
        cmd /c "mklink /D D:\NT D:\minimal_XP" 2>nul
        dir D:\NT\base\ntos\ke 2>nul

    - name: Patch razzle (skip certs)
      shell: cmd
      working-directory: D:\NT
      run: |
        REM Fix razzle.cmd to skip certificate installation (broken on modern Windows)
        powershell -Command "(gc tools\razzle.cmd) -replace 'echo Verifying that the Testroot','goto :SkipCerts' | sc tools\razzle.cmd"
        echo razzle patched

    - name: Build kernel with razzle
      shell: cmd
      working-directory: D:\NT
      run: |
        set _BuildArch=x86
        set 386=1
        set PROCESSOR_ARCHITECTURE=x86
        echo === Starting razzle.cmd ===
        call tools\razzle.cmd free offline
        if errorlevel 1 (echo RAZZLE FAILED && exit /b 1)
        echo RAZZLE OK — _BuildArch=%_BuildArch% _NTBINDIR=%_NTBINDIR%
        
        echo === Building base/ntos (minimal kernel) ===
        cd base\ntos
        build /cZP
        echo BUILD EXIT: %ERRORLEVEL%
        dir /s ntoskrnl.exe 2>nul || echo No ntoskrnl.exe found

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ntoskrnl
        path: D:\NT\base\ntos\**\ntoskrnl.exe
