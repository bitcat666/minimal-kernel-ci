name: Build Minimal XP Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download source
      shell: pwsh
      run: |
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" -Headers $headers
        $asset = $release.assets | Where-Object { $_.name -like "minimal_XP*" }
        Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile "minimal_XP.7z"
        7z x minimal_XP.7z -oD:\ -y

    - name: Compile kernel modules
      shell: cmd
      working-directory: D:\minimal_XP
      run: |
        set PATH=D:\minimal_XP\tools\x86;%PATH%
        set INCLUDE=D:\minimal_XP\public\sdk\inc;D:\minimal_XP\public\sdk\inc\crt;D:\minimal_XP\public\internal\windows\inc;D:\minimal_XP\base\ntos\inc;D:\minimal_XP\public\halkit\inc
        set CFLAGS=/c /O1 /GX -D_X86_=1 -Di386=1 -DSTD_CALL -DNT_UP=1 -DWIN32 -D_WIN32 -DWINNT=1 -DNT -DUNICODE -D_UNICODE -D_WIN32_WINNT=0x0501 -DWINVER=0x0501
        
        for /d %%m in (ke mm io ob ps ex init rtl lpc) do (
            echo --- %%m ---
            if not exist base\ntos\%%m\i386 mkdir base\ntos\%%m\i386
            for %%f in (base\ntos\%%m\*.c base\ntos\%%m\*.cpp base\ntos\%%m\i386\*.c base\ntos\%%m\i386\*.asm) do (
                if exist %%f cl.exe %CFLAGS% /Fobase\ntos\%%m\i386\%%~nf.obj %%f 2>&1 | findstr /V "Copyright Microsoft" >nul
            )
        )
        echo COMPILE DONE

    - name: Link ntoskrnl.exe
      shell: cmd
      working-directory: D:\minimal_XP
      run: |
        set PATH=D:\minimal_XP\tools\x86;%PATH%
        echo === Collecting all .obj files ===
        del link.rsp 2>nul
        for /r base\ntos %%f in (*.obj) do echo %%f >> link.rsp
        for /r base\hals %%f in (*.obj) do echo %%f >> link.rsp
        
        echo === Adding SDK libs ===
        for %%f in (public\sdk\lib\i386\*.lib) do echo %%f >> link.rsp
        
        echo === Linking ntoskrnl.exe ===
        link.exe /SUBSYSTEM:NATIVE /DRIVER /MACHINE:IX86 /BASE:0x00400000 /ENTRY:KiSystemStartup@4 /OUT:ntoskrnl.exe @link.rsp 2>&1 | findstr /C:"error" /C:"fatal" /C:"Creating" /C:"unresolved"
        if exist ntoskrnl.exe (
            echo LINK SUCCESS
            dir ntoskrnl.exe
        ) else (
            echo LINK FAILED - checking unresolved
            link.exe /SUBSYSTEM:NATIVE /DRIVER /MACHINE:IX86 /BASE:0x00400000 /ENTRY:KiSystemStartup@4 /OUT:ntoskrnl.exe @link.rsp 2>&1 | findstr /C:"unresolved" | head -20
        )

    - name: Upload kernel
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ntoskrnl
        path: |
          D:\minimal_XP\ntoskrnl.exe
          D:\minimal_XP\base\ntos\**\*.obj
