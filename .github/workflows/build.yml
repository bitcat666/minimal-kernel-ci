name: Build Minimal XP Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download source
      shell: pwsh
      run: |
        $repo = "${{ github.repository }}"
        $token = "${{ secrets.GITHUB_TOKEN }}"
        $headers = @{ Authorization = "Bearer $token" }
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" -Headers $headers
        $asset = $release.assets | Where-Object { $_.name -like "minimal_XP*" }
        Invoke-WebRequest -Uri $asset.browser_download_url -Headers $headers -OutFile "minimal_XP.7z"
        7z x minimal_XP.7z -oD:\ -y

    - name: Compile kernel modules
      shell: cmd
      working-directory: D:\minimal_XP
      run: |
        set PATH=D:\minimal_XP\tools\x86;%PATH%
        set INCLUDE=D:\minimal_XP\public\sdk\inc;D:\minimal_XP\public\sdk\inc\crt;D:\minimal_XP\public\internal\windows\inc;D:\minimal_XP\base\ntos\inc;D:\minimal_XP\public\halkit\inc
        set CFLAGS=/c /O1 /GX -D_X86_=1 -Di386=1 -DSTD_CALL -DNT_UP=1 -DWIN32 -D_WIN32 -DWINNT=1 -DNT -DUNICODE -D_UNICODE -D_WIN32_WINNT=0x0501 -DWINVER=0x0501
        
        for /d %%m in (ke mm io ob ps ex init rtl lpc) do (
            echo --- %%m ---
            if not exist base\ntos\%%m\i386 mkdir base\ntos\%%m\i386
            for %%f in (base\ntos\%%m\*.c base\ntos\%%m\*.cpp base\ntos\%%m\i386\*.c base\ntos\%%m\i386\*.asm) do (
                if exist %%f cl.exe %CFLAGS% /Fobase\ntos\%%m\i386\%%~nf.obj %%f >nul 2>&1
            )
        )
        echo COMPILE DONE

    - name: Link ntoskrnl.exe
      shell: pwsh
      working-directory: D:\minimal_XP
      run: |
        $env:PATH = "D:\minimal_XP\tools\x86;" + $env:PATH
        
        Write-Host "=== Collecting i386 .obj ONLY ==="
        $objs = Get-ChildItem -Recurse base\ntos\*.obj, base\hals\*.obj | Where-Object { $_.FullName -match '\\i386\\' }
        $objs | ForEach-Object { $_.FullName } | Out-File -Encoding ascii link.rsp
        
        Write-Host "Objects: $($objs.Count)"
        
        Write-Host "=== Adding SDK libs ==="
        Get-ChildItem public\sdk\lib\i386\*.lib | ForEach-Object { $_.FullName } | Out-File -Encoding ascii -Append link.rsp
        
        Write-Host "=== Linking ==="
        $result = & D:\minimal_XP\tools\x86\link.exe /SUBSYSTEM:NATIVE /DRIVER /MACHINE:IX86 /BASE:0x00400000 /ENTRY:KiSystemStartup@4 /OUT:ntoskrnl.exe @link.rsp 2>&1
        $errors = $result | Select-String "error|unresolved"
        $errors | ForEach-Object { $_.Line }
        
        if (Test-Path ntoskrnl.exe) {
            Write-Host "============================================================"
            Write-Host " LINK SUCCESS! "
            Write-Host "============================================================"
            Get-Item ntoskrnl.exe | Format-List
        } else {
            Write-Host "============================================================"
            Write-Host " LINK FAILED — $($errors.Count) errors"
            Write-Host "============================================================"
        }

    - name: Upload kernel
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ntoskrnl
        path: |
          D:\minimal_XP\ntoskrnl.exe
          D:\minimal_XP\base\ntos\**\i386\*.obj
